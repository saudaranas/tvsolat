  <style>
    :root{
      --primary:#1a6b3c;
      --primary-bright:#21894d;
      --primary-dim:rgba(26,107,60,0.1);
      --gold:#c9a84c;
      --gold-light:#f0d080;
      --navy:#061409;
      --navy-mid:#091f0e;
      --white:#ffffff;
      --off-white:#f4f8f5;
      --muted:#4a6655;
      --border:rgba(26,107,60,0.15);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--navy);overflow-x:hidden}

    /* NAV */
    nav{position:fixed;top:0;width:100%;z-index:200;background:rgba(255,255,255,0.97);backdrop-filter:blur(16px);height:66px;display:flex;align-items:center;justify-content:space-between;padding:0 6vw;border-bottom:1px solid rgba(0,0,0,0.07);transition:box-shadow 0.3s}
    .logo{display:flex;align-items:center;gap:8px;text-decoration:none}
    .logo-img{height:52px;width:auto;object-fit:contain;flex-shrink:0;background:transparent;max-width:180px}
    @media(max-width:768px){.logo-img{height:44px;max-width:150px}}
    @media(max-width:480px){.logo-img{height:36px;max-width:120px}}
    .nav-links{display:flex;align-items:center;gap:2rem;list-style:none}
    .nav-links a{color:rgba(6,20,9,0.6);text-decoration:none;font-size:0.875rem;font-weight:500;transition:color 0.2s}
    .nav-links a:hover{color:var(--primary)}
    .btn-nav{background:var(--primary);color:var(--white)!important;padding:9px 20px;border-radius:7px;font-weight:600!important;transition:all 0.2s!important}
    .btn-nav:hover{background:var(--primary-bright)!important;transform:translateY(-1px)}
    .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
    .hamburger span{width:24px;height:2px;background:var(--navy);border-radius:2px;display:block}

    /* HERO */
    #hero{min-height:100vh;background:radial-gradient(ellipse 70% 60% at 65% 50%,rgba(26,107,60,0.2) 0%,transparent 65%),linear-gradient(155deg,var(--navy) 0%,var(--navy-mid) 55%,#0c2216 100%);display:flex;align-items:center;padding:100px 6vw 70px;position:relative;overflow:hidden}
    .hero-glow{position:absolute;right:15%;top:28%;width:340px;height:340px;background:radial-gradient(circle,rgba(26,107,60,0.22) 0%,transparent 70%);border-radius:50%;pointer-events:none;animation:pulse 4s ease-in-out infinite}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.15);opacity:1}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    .hero-content{position:relative;z-index:2;max-width:600px}
    .badge{display:inline-flex;align-items:center;gap:8px;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.35);color:var(--gold-light);padding:7px 16px;border-radius:100px;font-size:.77rem;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:28px;animation:fadeUp .5s ease both}
    h1{font-family:'Playfair Display',serif;font-size:clamp(2.1rem,4.8vw,3.6rem);font-weight:900;color:var(--white);line-height:1.12;letter-spacing:-.5px;margin-bottom:22px;animation:fadeUp .6s ease .1s both}
    h1 .accent{color:var(--gold)}
    .hero-desc{font-size:clamp(.95rem,1.7vw,1.08rem);color:rgba(255,255,255,.68);line-height:1.75;margin-bottom:38px;font-weight:300;animation:fadeUp .6s ease .2s both}
    .hero-btns{display:flex;flex-wrap:wrap;gap:14px;animation:fadeUp .6s ease .3s both}
    .btn-primary{background:var(--primary);color:var(--white);padding:15px 30px;border-radius:9px;font-weight:700;font-size:.95rem;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all .2s;box-shadow:0 6px 24px rgba(26,107,60,.4)}
    .btn-primary:hover{background:var(--primary-bright);transform:translateY(-2px);box-shadow:0 10px 32px rgba(26,107,60,.5)}
    .btn-outline{background:transparent;color:var(--white);border:1.5px solid rgba(255,255,255,.35);padding:15px 28px;border-radius:9px;font-weight:600;font-size:.95rem;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all .2s}
    .btn-outline:hover{border-color:var(--gold);background:rgba(201,168,76,.08);transform:translateY(-2px)}
    .hero-stats{display:flex;gap:32px;flex-wrap:wrap;margin-top:52px;padding-top:36px;border-top:1px solid rgba(255,255,255,.1);animation:fadeUp .6s ease .4s both}
    .stat-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--gold);line-height:1}
    .stat-label{font-size:.78rem;color:rgba(255,255,255,.5);margin-top:4px}
    .hero-tv-wrap{position:absolute;right:6vw;top:50%;transform:translateY(-50%);width:min(400px,36vw);animation:fadeUp .8s ease .3s both;z-index:2}
    .tv-outer-frame{background:#111;border-radius:16px;border:4px solid #222;padding:10px;box-shadow:0 40px 80px rgba(0,0,0,.65)}
    .tv-screen-real{width:100%;border-radius:6px;display:block;aspect-ratio:16/9;object-fit:cover;background:#0a1628}
    .tv-stand-bar{width:28%;height:12px;background:#0d0d0d;margin:0 auto;border-radius:0 0 4px 4px}
    .tv-stand-base{width:48%;height:7px;background:#111;margin:0 auto;border-radius:0 0 6px 6px}

    /* SHARED */
    section{padding:90px 6vw}
    .section-label{display:inline-block;font-size:.74rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--primary);margin-bottom:12px}
    h2{font-family:'Playfair Display',serif;font-size:clamp(1.7rem,3.2vw,2.6rem);font-weight:700;line-height:1.2;color:var(--navy);margin-bottom:16px}
    .section-sub{font-size:1rem;color:var(--muted);line-height:1.7;max-width:520px}
    .section-head{margin-bottom:56px}
    .section-head.center{text-align:center}
    .section-head.center .section-sub{margin:0 auto}

    /* KENAPA */
    #kenapa{background:var(--off-white)}
    .features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px}
    .feat-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:32px 28px;transition:transform .25s,box-shadow .25s,border-color .25s}
    .feat-card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(6,20,9,.1);border-color:rgba(26,107,60,.3)}
    .feat-icon{width:52px;height:52px;background:var(--primary-dim);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:20px}
    .feat-card h3{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--navy);margin-bottom:10px}
    .feat-card p{font-size:.88rem;color:var(--muted);line-height:1.65}

    /* FUNGSI */
    #fungsi{background:var(--white)}
    .fungsi-wrap{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
    .fungsi-visual{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);border-radius:20px;padding:24px;box-shadow:0 24px 64px rgba(6,20,9,.2)}
    .fungsi-visual p{color:rgba(255,255,255,.45);font-size:.68rem;margin-bottom:12px;letter-spacing:1px;text-transform:uppercase}
    .tv-preview-img{width:100%;border-radius:10px;display:block;border:2px solid rgba(255,255,255,.08)}

    .fungsi-list{list-style:none;display:flex;flex-direction:column;gap:14px}
    .fungsi-item{display:flex;align-items:flex-start;gap:14px;padding:16px 18px;border-radius:10px;border:1px solid var(--border);background:var(--off-white);transition:border-color .2s,background .2s}
    .fungsi-item:hover{border-color:rgba(26,107,60,.3);background:#eaf2ed}
    .fungsi-dot{width:32px;height:32px;flex-shrink:0;background:linear-gradient(135deg,var(--primary),var(--primary-bright));border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--white);font-size:.8rem;font-weight:700}
    .fungsi-item h4{font-size:.9rem;font-weight:600;color:var(--navy);margin-bottom:3px}
    .fungsi-item p{font-size:.8rem;color:var(--muted);line-height:1.5}

    /* GALLERY */
    #gallery{background:var(--off-white)}
    .gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .gallery-item{border-radius:14px;overflow:hidden;position:relative;cursor:pointer;background:#111;border:1px solid var(--border);aspect-ratio:16/9;transition:transform .25s,box-shadow .25s}
    .gallery-item:hover{transform:translateY(-3px);box-shadow:0 12px 36px rgba(6,20,9,.18)}
    .gallery-item.wide{grid-column:span 2;aspect-ratio:21/9}
    .gallery-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
    .gallery-item:hover img{transform:scale(1.05)}
    /* Overlay — sentiasa nampak di bawah, hover tunjuk description penuh */
    .g-overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;background:linear-gradient(to top,rgba(4,14,7,.92) 0%,rgba(4,14,7,.3) 45%,transparent 70%);transition:background .3s}
    .gallery-item:hover .g-overlay{background:linear-gradient(to top,rgba(4,14,7,.97) 0%,rgba(4,14,7,.6) 55%,rgba(4,14,7,.15) 100%)}
    .g-cap-wrap{padding:12px 14px;transform:translateY(0);transition:transform .3s}
    .g-cap-title{color:#fff;font-size:.8rem;font-weight:700;display:flex;align-items:center;gap:5px;margin-bottom:0;line-height:1.3;text-shadow:0 1px 3px rgba(0,0,0,.5)}
    .g-cap-desc{color:rgba(255,255,255,.0);font-size:.7rem;line-height:1.5;margin-top:5px;max-height:0;overflow:hidden;transition:max-height .35s ease,color .3s,margin .3s}
    .gallery-item:hover .g-cap-desc{color:rgba(255,255,255,.82);max-height:60px;margin-top:6px}
    .g-zoom{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.45);color:#fff;font-size:.65rem;padding:3px 8px;border-radius:20px;opacity:0;transition:opacity .3s}
    .gallery-item:hover .g-zoom{opacity:1}

    /* VIDEO SECTION */
    #video-demo{background:var(--white)}
    .video-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
    .video-wrap{border-radius:14px;overflow:hidden;border:1px solid var(--border);background:#000;aspect-ratio:16/9}
    .video-wrap video{width:100%;height:100%;object-fit:cover;display:block}
    .video-caption{text-align:center;font-size:.82rem;color:var(--muted);margin-top:10px;font-weight:500}

    /* PAKEJ */
    #harga{background:var(--off-white)}
    .pakej-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:32px;max-width:840px;margin:0 auto}
    .pakej-card{border-radius:24px;padding:44px 36px;position:relative;transition:transform .25s,box-shadow .25s}
    .pakej-card:hover{transform:translateY(-5px)}
    .pakej-tv{background:var(--navy);border:2px solid var(--primary);box-shadow:0 24px 64px rgba(6,20,9,.25)}
    .pakej-tv:hover{box-shadow:0 36px 80px rgba(6,20,9,.32)}
    .pakej-kayu{background:var(--white);border:2px solid var(--border);box-shadow:0 8px 32px rgba(6,20,9,.07)}
    .pakej-kayu:hover{box-shadow:0 16px 48px rgba(6,20,9,.12);border-color:rgba(26,107,60,.3)}
    .pakej-badge{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:.73rem;font-weight:700;padding:6px 20px;border-radius:100px;white-space:nowrap}
    .gold-badge{background:var(--gold);color:var(--navy)}
    .green-badge{background:var(--primary);color:var(--white)}
    .pakej-icon{font-size:2.4rem;margin-bottom:14px}
    .pakej-tier{font-size:.8rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
    .pakej-tv .pakej-tier{color:rgba(255,255,255,.5)}
    .pakej-kayu .pakej-tier{color:var(--muted)}
    .pakej-name{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;margin-bottom:4px}
    .pakej-tv .pakej-name{color:var(--white)}
    .pakej-kayu .pakej-name{color:var(--navy)}
    .pakej-price{font-family:'Playfair Display',serif;font-size:3rem;font-weight:900;line-height:1;margin:20px 0 4px}
    .pakej-tv .pakej-price{color:var(--gold)}
    .pakej-kayu .pakej-price{color:var(--primary)}
    .pakej-note{font-size:.8rem;margin-bottom:28px}
    .pakej-tv .pakej-note{color:rgba(255,255,255,.38)}
    .pakej-kayu .pakej-note{color:var(--muted)}
    .pakej-divider{height:1px;margin-bottom:24px}
    .pakej-tv .pakej-divider{background:rgba(255,255,255,.08)}
    .pakej-kayu .pakej-divider{background:var(--border)}
    .pakej-features{list-style:none;display:flex;flex-direction:column;gap:11px;margin-bottom:32px}
    .pakej-features li{display:flex;align-items:flex-start;gap:10px;font-size:.87rem;line-height:1.4}
    .pakej-tv .pakej-features li{color:rgba(255,255,255,.82)}
    .pakej-kayu .pakej-features li{color:var(--navy)}
    .pakej-features li::before{content:'✓';font-weight:700;flex-shrink:0}
    .pakej-tv .pakej-features li::before{color:var(--gold)}
    .pakej-kayu .pakej-features li::before{color:var(--primary)}
    .btn-pakej{display:block;width:100%;text-align:center;padding:15px;border-radius:10px;font-weight:700;font-size:.95rem;text-decoration:none;transition:all .2s}
    .btn-gold{background:var(--gold);color:var(--navy)}
    .btn-gold:hover{background:var(--gold-light);transform:translateY(-1px)}
    .btn-green{background:var(--primary);color:var(--white)}
    .btn-green:hover{background:var(--primary-bright);transform:translateY(-1px)}
    .pakej-disclaimer{font-size:.74rem;margin-top:12px;text-align:center}
    .pakej-tv .pakej-disclaimer{color:rgba(255,255,255,.28)}
    .pakej-kayu .pakej-disclaimer{color:var(--muted)}

    /* TESTIMONI */
    #testimoni{background:var(--navy)}
    #testimoni .section-label{color:var(--gold)}
    #testimoni h2{color:var(--white)}
    #testimoni .section-sub{color:rgba(255,255,255,.5)}
    .testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:32px}
    .testi-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:28px 24px;transition:border-color .25s,background .25s;display:flex;flex-direction:column}
    .testi-card:hover{border-color:rgba(26,107,60,.5);background:rgba(26,107,60,.08)}
    .testi-stars{color:var(--gold);font-size:.95rem;letter-spacing:2px;margin-bottom:14px}
    .testi-quote{font-size:.875rem;color:rgba(255,255,255,.72);line-height:1.75;font-style:italic;flex:1;margin-bottom:18px}

    .testi-author{display:flex;align-items:center;gap:12px}

    .testi-stat-label{font-size:.78rem;color:rgba(255,255,255,.45);margin-top:6px}
