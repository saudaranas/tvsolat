<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Solat – Sistem Paparan Waktu Solat Digital untuk Masjid & Surau Malaysia</title>
  <meta name="description" content="TV Solat menyediakan sistem paparan waktu solat digital untuk masjid, surau, sekolah dan pejabat seluruh Malaysia. Mudah dipasang, mampu milik dan terkini." />
  <meta name="keywords" content="tv solat, jam solat tv, waktu solat masjid, paparan waktu solat digital, sistem tv masjid, jam solat digital malaysia, software masjid, tv surau, iqamah timer" />
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="TV Solat – Sistem Paparan Waktu Solat Digital" />
  <meta property="og:description" content="Pasang sistem TV Solat di masjid dan surau anda. Waktu solat JAKIM, slides pengumuman, iqamah timer dan banyak lagi." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://tvsolat.live" />
  <link rel="canonical" href="https://tvsolat.live" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:#0a1628;--navy-mid:#0d2045;--royal:#1e4db7;--royal-bright:#2d63e2;
      --gold:#c9a84c;--gold-light:#f0d080;--white:#ffffff;--off-white:#f5f7fc;
      --muted:#8a9ab8;--border:rgba(30,77,183,0.15);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--navy);overflow-x:hidden}

    /* NAV */
    nav{position:fixed;top:0;width:100%;z-index:200;background:rgba(255,255,255,0.97);backdrop-filter:blur(16px);height:66px;display:flex;align-items:center;justify-content:space-between;padding:0 6vw;border-bottom:1px solid rgba(0,0,0,0.08);transition:box-shadow 0.3s}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo-box{width:38px;height:38px;background:linear-gradient(135deg,var(--royal),var(--royal-bright));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;box-shadow:0 4px 14px rgba(30,77,183,0.3)}
    .logo-text{font-weight:700;color:var(--navy);font-size:1.05rem}
    .logo-text span{color:var(--royal)}
    .nav-links{display:flex;align-items:center;gap:2rem;list-style:none}
    .nav-links a{color:rgba(10,22,40,0.65);text-decoration:none;font-size:0.875rem;font-weight:500;transition:color 0.2s}
    .nav-links a:hover{color:var(--royal)}
    .btn-nav{background:var(--royal);color:var(--white)!important;padding:9px 20px;border-radius:7px;font-weight:600!important;transition:background 0.2s,transform 0.15s!important}
    .btn-nav:hover{background:var(--royal-bright)!important;transform:translateY(-1px)}
    .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
    .hamburger span{width:24px;height:2px;background:var(--navy);border-radius:2px;display:block;transition:0.3s}

    /* HERO */
    #hero{min-height:100vh;background:radial-gradient(ellipse 80% 60% at 70% 50%,rgba(30,77,183,0.18) 0%,transparent 60%),linear-gradient(150deg,var(--navy) 0%,var(--navy-mid) 50%,#0e2858 100%);display:flex;align-items:center;padding:100px 6vw 70px;position:relative;overflow:hidden}
    .hero-deco{position:absolute;right:0;top:0;bottom:0;width:48%;display:flex;align-items:center;justify-content:center;opacity:0.04;pointer-events:none}
    .hero-glow{position:absolute;right:18%;top:30%;width:320px;height:320px;background:radial-gradient(circle,rgba(30,77,183,0.3) 0%,transparent 70%);border-radius:50%;pointer-events:none;animation:pulse 4s ease-in-out infinite}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.15);opacity:1}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    .hero-content{position:relative;z-index:2;max-width:620px}
    .badge{display:inline-flex;align-items:center;gap:8px;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.35);color:var(--gold-light);padding:7px 16px;border-radius:100px;font-size:0.77rem;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:28px;animation:fadeUp 0.5s ease both}
    h1{font-family:'Playfair Display',serif;font-size:clamp(2.1rem,4.8vw,3.6rem);font-weight:900;color:var(--white);line-height:1.12;letter-spacing:-0.5px;margin-bottom:22px;animation:fadeUp 0.6s ease 0.1s both}
    h1 .accent{color:var(--gold)}
    .hero-desc{font-size:clamp(0.95rem,1.7vw,1.08rem);color:rgba(255,255,255,0.68);line-height:1.75;margin-bottom:38px;font-weight:300;animation:fadeUp 0.6s ease 0.2s both}
    .hero-btns{display:flex;flex-wrap:wrap;gap:14px;animation:fadeUp 0.6s ease 0.3s both}
    .btn-primary{background:var(--royal);color:var(--white);padding:15px 30px;border-radius:9px;font-weight:700;font-size:0.95rem;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:background 0.2s,transform 0.15s,box-shadow 0.2s;box-shadow:0 6px 24px rgba(30,77,183,0.45)}
    .btn-primary:hover{background:var(--royal-bright);transform:translateY(-2px);box-shadow:0 10px 32px rgba(30,77,183,0.55)}
    .btn-outline{background:transparent;color:var(--white);border:1.5px solid rgba(255,255,255,0.35);padding:15px 28px;border-radius:9px;font-weight:600;font-size:0.95rem;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:border-color 0.2s,background 0.2s,transform 0.15s}
    .btn-outline:hover{border-color:var(--gold);background:rgba(201,168,76,0.08);transform:translateY(-2px)}
    .hero-stats{display:flex;gap:32px;flex-wrap:wrap;margin-top:52px;padding-top:36px;border-top:1px solid rgba(255,255,255,0.1);animation:fadeUp 0.6s ease 0.4s both}
    .stat-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--gold);line-height:1}
    .stat-label{font-size:0.78rem;color:rgba(255,255,255,0.5);margin-top:4px;font-weight:400}

    /* SHARED */
    section{padding:90px 6vw}
    .section-label{display:inline-block;font-size:0.74rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--royal);margin-bottom:12px}
    h2{font-family:'Playfair Display',serif;font-size:clamp(1.7rem,3.2vw,2.6rem);font-weight:700;line-height:1.2;color:var(--navy);margin-bottom:16px}
    .section-sub{font-size:1rem;color:var(--muted);line-height:1.7;max-width:520px}
    .section-head{margin-bottom:56px}
    .section-head.center{text-align:center}
    .section-head.center .section-sub{margin:0 auto}

    /* KENAPA */
    #kenapa{background:var(--off-white)}
    .features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px}
    .feat-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:32px 28px;transition:transform 0.25s,box-shadow 0.25s,border-color 0.25s}
    .feat-card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(10,22,40,0.1);border-color:rgba(30,77,183,0.3)}
    .feat-icon{width:52px;height:52px;background:linear-gradient(135deg,rgba(30,77,183,0.1),rgba(30,77,183,0.05));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:20px}
    .feat-card h3{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--navy);margin-bottom:10px}
    .feat-card p{font-size:0.88rem;color:var(--muted);line-height:1.65}

    /* FUNGSI */
    #fungsi{background:var(--white)}
    .fungsi-wrap{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
    .fungsi-visual{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);border-radius:20px;padding:36px;box-shadow:0 24px 64px rgba(10,22,40,0.2);position:relative;overflow:hidden}
    .fungsi-visual::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(30,77,183,0.4),transparent 70%)}
    .tv-mockup{background:#0d1a35;border-radius:10px;padding:20px;border:2px solid rgba(255,255,255,0.07)}
    .tv-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .tv-title{color:var(--gold);font-family:'Playfair Display',serif;font-size:1rem;font-weight:700}
    .tv-date{color:rgba(255,255,255,0.4);font-size:0.72rem}
    .tv-time{text-align:center;font-family:'Playfair Display',serif;font-size:3.5rem;font-weight:900;color:var(--white);letter-spacing:4px;margin:12px 0}
    .tv-solat-name{text-align:center;color:var(--gold);font-size:0.8rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:18px}
    .tv-waktu-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
    .tv-waktu-item{background:rgba(255,255,255,0.05);border-radius:6px;padding:8px 4px;text-align:center}
    .tv-waktu-item.aktif{background:rgba(30,77,183,0.4);border:1px solid rgba(30,77,183,0.6)}
    .tv-waktu-item .nama{font-size:0.6rem;color:rgba(255,255,255,0.45)}
    .tv-waktu-item .masa{font-size:0.72rem;color:var(--white);font-weight:600}
    .tv-waktu-item.aktif .nama{color:var(--gold-light)}
    .tv-slide{margin-top:14px;background:rgba(255,255,255,0.04);border-radius:8px;padding:12px;font-size:0.75rem;color:rgba(255,255,255,0.5);text-align:center;border:1px dashed rgba(255,255,255,0.08)}
    .fungsi-list{list-style:none;display:flex;flex-direction:column;gap:14px}
    .fungsi-item{display:flex;align-items:flex-start;gap:14px;padding:16px 18px;border-radius:10px;border:1px solid var(--border);background:var(--off-white);transition:border-color 0.2s,background 0.2s}
    .fungsi-item:hover{border-color:rgba(30,77,183,0.3);background:#edf1fb}
    .fungsi-dot{width:32px;height:32px;flex-shrink:0;background:linear-gradient(135deg,var(--royal),var(--royal-bright));border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--white);font-size:0.8rem;font-weight:700}
    .fungsi-item h4{font-size:0.9rem;font-weight:600;color:var(--navy);margin-bottom:3px}
    .fungsi-item p{font-size:0.8rem;color:var(--muted);line-height:1.5}

    /* PRODUK */
    #produk{background:var(--off-white)}
    .produk-wrap{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
    .produk-img-box{background:linear-gradient(135deg,#e8eef8 0%,#d0daf0 100%);border-radius:20px;padding:40px 32px;display:flex;align-items:center;justify-content:center;min-height:380px;border:1px solid var(--border);position:relative;overflow:hidden}
    .produk-img-box::before{content:'';position:absolute;top:-40px;left:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(30,77,183,0.1),transparent 70%)}
    .device-outer{background:#1a1a2e;border-radius:14px;padding:8px 14px 8px 8px;border:2px solid #2d2d50;box-shadow:0 20px 60px rgba(10,22,40,0.25);display:flex;align-items:center;gap:12px;margin-bottom:20px;position:relative;z-index:1}
    .device-led{width:8px;height:8px;border-radius:50%;background:#2ecc71;box-shadow:0 0 8px #2ecc71;flex-shrink:0}
    .device-info{flex:1}
    .device-name{font-size:0.72rem;font-weight:700;color:#fff}
    .device-model{font-size:0.6rem;color:rgba(255,255,255,0.4);margin-top:2px}
    .device-screen-wrap{background:#0a1628;border-radius:10px;border:2px solid #1e3a6b;padding:14px;width:100%;position:relative;z-index:1;box-shadow:0 12px 40px rgba(10,22,40,0.3)}
    .ds-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .ds-masjid{color:var(--gold);font-size:0.65rem;font-weight:700}
    .ds-date{color:rgba(255,255,255,0.35);font-size:0.55rem}
    .ds-waktu-label{text-align:center;color:var(--gold);font-size:0.55rem;letter-spacing:2px;margin-bottom:4px}
    .ds-time{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:900;color:#fff;text-align:center;letter-spacing:3px;line-height:1;margin-bottom:10px}
    .ds-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
    .ds-item{background:rgba(255,255,255,0.05);border-radius:4px;padding:5px 2px;text-align:center}
    .ds-item.on{background:rgba(30,77,183,0.45)}
    .ds-item span{display:block;font-size:0.45rem;color:rgba(255,255,255,0.4)}
    .ds-item strong{display:block;font-size:0.55rem;color:#fff}
    .ds-item.on span{color:var(--gold-light)}
    .hdmi-tag{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:14px}
    .hdmi-line{flex:1;height:2px;background:rgba(30,77,183,0.25);border-radius:1px}
    .hdmi-label{font-size:0.62rem;color:var(--muted);background:var(--off-white);border:1px solid var(--border);padding:3px 10px;border-radius:20px}
    .float-badge{position:absolute;bottom:20px;right:-12px;background:var(--white);border:1px solid var(--border);border-radius:10px;padding:10px 14px;box-shadow:0 8px 24px rgba(10,22,40,0.1);font-size:0.75rem;z-index:2}
    .float-badge strong{display:block;color:var(--navy);font-weight:700}
    .float-badge span{color:var(--muted)}
    .produk-specs{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .spec-item{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px 20px;transition:border-color 0.2s,transform 0.2s}
    .spec-item:hover{border-color:rgba(30,77,183,0.3);transform:translateY(-2px)}
    .spec-icon{font-size:1.3rem;margin-bottom:10px}
    .spec-item h4{font-size:0.88rem;font-weight:700;color:var(--navy);margin-bottom:4px}
    .spec-item p{font-size:0.78rem;color:var(--muted);line-height:1.5}

    /* GALLERY */
    #gallery{background:var(--white)}
    .gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .gallery-item{border-radius:14px;overflow:hidden;position:relative;cursor:pointer;background:linear-gradient(135deg,#e8eef8,#d0daf0);border:1px solid var(--border);aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;transition:transform 0.3s,box-shadow 0.3s}
    .gallery-item:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(10,22,40,0.15)}
    .gallery-item.wide{grid-column:span 2;aspect-ratio:16/7}
    .gallery-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,22,40,0.75) 0%,transparent 55%);opacity:0;transition:opacity 0.3s;display:flex;align-items:flex-end;padding:14px}
    .gallery-item:hover .gallery-overlay{opacity:1}
    .gallery-label{color:#fff;font-size:0.8rem;font-weight:600}

    /* TESTIMONI */
    #testimoni{background:var(--navy)}
    #testimoni .section-label{color:var(--gold)}
    #testimoni h2{color:var(--white)}
    #testimoni .section-sub{color:rgba(255,255,255,0.5)}
    .testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:32px}
    .testi-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:28px 24px;transition:border-color 0.25s,background 0.25s;display:flex;flex-direction:column}
    .testi-card:hover{border-color:rgba(30,77,183,0.5);background:rgba(30,77,183,0.1)}
    .testi-stars{color:var(--gold);font-size:0.95rem;letter-spacing:2px;margin-bottom:14px}
    .testi-quote{font-size:0.875rem;color:rgba(255,255,255,0.72);line-height:1.75;font-style:italic;flex:1;margin-bottom:18px}
    .testi-divider{height:1px;background:rgba(255,255,255,0.07);margin-bottom:16px}
    .testi-author{display:flex;align-items:center;gap:12px}
    .testi-avatar{width:42px;height:42px;background:linear-gradient(135deg,var(--royal),var(--royal-bright));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8rem;color:var(--white);font-weight:700;flex-shrink:0}
    .testi-name{font-size:0.85rem;font-weight:600;color:var(--white)}
    .testi-place{font-size:0.73rem;color:rgba(255,255,255,0.38);margin-top:2px}
    .testi-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
    .testi-stat-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:24px 20px;text-align:center}
    .testi-stat-num{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:900;color:var(--gold)}
    .testi-stat-label{font-size:0.78rem;color:rgba(255,255,255,0.45);margin-top:6px}

    /* HARGA */
    #harga{background:var(--off-white)}
    .harga-center{display:flex;justify-content:center}
    .harga-card-single{background:var(--navy);border:2px solid var(--royal);border-radius:24px;padding:52px 60px;max-width:560px;width:100%;text-align:center;position:relative;box-shadow:0 32px 80px rgba(10,22,40,0.22);transition:transform 0.25s,box-shadow 0.25s}
    .harga-card-single:hover{transform:translateY(-4px);box-shadow:0 40px 90px rgba(10,22,40,0.28)}
    .popular-tag{position:absolute;top:-16px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--navy);font-size:0.75rem;font-weight:700;padding:6px 20px;border-radius:100px;letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap}
    .harga-card-single h3{font-size:1rem;font-weight:600;color:rgba(255,255,255,0.6);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase}
    .harga-price{font-family:'Playfair Display',serif;font-size:4rem;font-weight:900;color:var(--gold);line-height:1;margin:16px 0 6px}
    .harga-note{font-size:0.82rem;color:rgba(255,255,255,0.4);margin-bottom:36px}
    .harga-divider{height:1px;background:rgba(255,255,255,0.08);margin-bottom:32px}
    .harga-features{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:36px;text-align:left}
    .harga-features li{display:flex;align-items:center;gap:10px;font-size:0.88rem;color:rgba(255,255,255,0.8)}
    .harga-features li::before{content:'✓';color:var(--gold);font-weight:700;flex-shrink:0;font-size:1rem}
    .btn-card-solid{display:inline-block;width:100%;text-align:center;padding:16px;border-radius:10px;font-weight:700;font-size:1rem;text-decoration:none;background:var(--gold);color:var(--navy);transition:background 0.2s,transform 0.15s}
    .btn-card-solid:hover{background:var(--gold-light);transform:translateY(-1px)}
    .harga-disclaimer{font-size:0.78rem;color:rgba(255,255,255,0.3);margin-top:18px}

    /* CARA */
    #cara{background:var(--white)}
    .steps-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:0;position:relative}
    .steps-grid::before{content:'';position:absolute;top:40px;left:60px;right:60px;height:1px;background:linear-gradient(90deg,transparent,var(--border),var(--border),transparent)}
    .step-item{padding:0 20px;text-align:center}
    .step-num{width:64px;height:64px;background:linear-gradient(135deg,var(--royal),var(--royal-bright));border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900;color:var(--white);margin:0 auto 20px;position:relative;z-index:1;box-shadow:0 6px 20px rgba(30,77,183,0.35)}
    .step-item h4{font-size:0.95rem;font-weight:700;color:var(--navy);margin-bottom:8px}
    .step-item p{font-size:0.82rem;color:var(--muted);line-height:1.6}

    /* FAQ */
    #faq{background:var(--off-white)}
    .faq-list{max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
    .faq-item{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden}
    .faq-q{padding:20px 24px;font-weight:600;font-size:0.92rem;color:var(--navy);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;user-select:none;transition:background 0.2s}
    .faq-q:hover{background:var(--off-white)}
    .arrow{flex-shrink:0;width:24px;height:24px;background:var(--off-white);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:var(--royal);transition:transform 0.3s,background 0.2s}
    .faq-ite
